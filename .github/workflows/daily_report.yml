name: Daily Diabetes AI Report

on:
  schedule:
    # Запуск каждый день в 17:00 UTC (это 22:00 по времени Екатеринбурга UTC+5)
    # Если захочешь изменить время, просто поменяй '0 17 * * *' (формат Cron в UTC)
    - cron: '0 17 * * *'
  workflow_dispatch:
    # Это позволит запускать скрипт вручную кнопкой на сайте в любой момент для теста

jobs:
  run-analyst:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Diabetes Analyst Script
      env:
        NIGHTSCOUT_URL: ${{ secrets.NIGHTSCOUT_URL }}
        NIGHTSCOUT_API_SECRET: ${{ secrets.NIGHTSCOUT_API_SECRET }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        LLM_MODEL: ${{ secrets.LLM_MODEL }}
      run: python main.py
